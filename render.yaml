services:
  - type: web
    name: water-billing-app
    runtime: docker
    plan: free
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    healthCheckPath: /login
    envVars:
      - key: APP_NAME
        value: Water Billing
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_KEY
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: water-billing-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: water-billing-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: water-billing-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: water-billing-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: water-billing-db
          property: password
      - key: CACHE_DRIVER
        value: file
      - key: SESSION_DRIVER
        value: cookie
      - key: QUEUE_CONNECTION
        value: sync
      - key: WHATSAPP_PROVIDER
        value: webjs
      - key: WHATSAPP_ADMIN_PHONE
        sync: false
      - key: WHATSAPP_WEBJS_BASE_URL
        sync: false
      - key: WHATSAPP_WEBJS_API_KEY
        sync: false
      - key: RUN_MIGRATIONS
        value: "true"

databases:
  - name: water-billing-db
    plan: free
